<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Transaction</title>

<style>
body{
    background: linear-gradient(to right, #1e3c72, #2a5298);
    text-align: center;
    margin-top: 200px;
    font-family: Arial, sans-serif;
}

.ViewDetails{
    background-color: white;
    width: 400px;
    margin: auto;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
}

h3{
    color: #2a5298;
    margin-bottom: 20px;
}

input{
    padding: 12px;
    width: 260px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button{
    padding: 12px 25px;
    background-color: #2a5298;
    color: white;
    border: none;
    border-radius: 6px;
}

button:hover{
    background-color: #1e3c72;
    cursor: pointer;
}
</style>

</head>

<body>

<form action="ViewTransactionServlet" method="get">

<div class="ViewDetails">
    <h3>View Transaction</h3>

    <!-- ✅ IMPORTANT FIX -->
    <input type="number" name="Account_No" placeholder="Enter Account Number" required>
    <br><br>

    <button type="submit">View Transaction</button>
</div>

</form>

</body>
</html>
