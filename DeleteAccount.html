<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Account</title>

    <style>
     body{
    background: linear-gradient(to right, #1e3c72, #2a5298);
    text-align: center;
    margin-top: 200px;
    font-family: Arial, sans-serif;
}

.Container{
    background-color: white;
    width: 420px;
    height: 260px;
    margin: auto;
    padding-top: 20px;
    border-radius: 12px;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
}

.First{
    padding-top: 40px;
    background-color: #f4f7fb;
    width: 100%;
    height: 190px;
    border-radius: 10px;
}

input{
    padding: 12px;
    width: 260px;
    border-radius: 6px;
    border: 1px solid #ccc;
    outline: none;
}

input:focus{
    border-color: #2a5298;
}

button{
    padding: 12px 25px;
    background-color: #2a5298;
    color: white;
    border: none;
    border-radius: 6px;
}

button:hover{
    cursor: pointer;
    background-color: #1e3c72;
}
    </style>
</head>

<body>

<div class="Container">
    <div class="First">

        <form action="DeleteServlet" method="post">
         <h3>Delete Account</h3>

            <input type="number" name="Account_No" placeholder="Enter Account Number" required><br><br>
            <input type="checkbox" required></input><br>

            <button type="submit">Delete Record</button>

        </form>

    </div>
</div>

</body>
</html>s
