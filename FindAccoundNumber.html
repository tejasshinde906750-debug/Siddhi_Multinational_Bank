<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<Style>

body{
    background: linear-gradient(to right, #1e3c72, #2a5298);
    text-align: center;
    margin-top: 200px;
    font-family: Arial, sans-serif;
}

.ViewDetails{
    background-color: white;
    width: 400px;
    margin: auto;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
}

h3{
    color: #2a5298;
    margin-bottom: 20px;
}

input{
    padding: 12px;
    width: 260px;
    border-radius: 6px;
    border: 1px solid #ccc;
    outline: none;
}

input:focus{
    border-color: #2a5298;
}

button{
    padding: 12px 25px;
    background-color: #2a5298;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
}

button:hover{
    background-color: #1e3c72;
    cursor: pointer;
}


</Style>
<body>
    <form action="FindAccNO" method="get">
    <div class="ViewDetails">
        <h3>View Accound Number</h3><br><br>
    <input type="text" name="Name" placeholder="Enter Customer Name" required><br><br>
    <button>Find</button>
    </div>
    </form>
</body>
</html>
