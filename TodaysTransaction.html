<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Date Input UI</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container box */
.form-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    text-align: center;
}

/* Label */
label {
    font-size: 16px;
    font-weight: bold;
    display: block;
    margin-bottom: 10px;
}

/* Date Input */
input[type="date"] {
    width: 250px;
    padding: 10px;
    font-size: 15px;
    border: 2px solid #4a90e2;
    border-radius: 8px;
    outline: none;
    margin-bottom: 15px;
    background: #fff;
}

/* Focus effect */
input[type="date"]:focus {
    border-color: #1d6fe3;
    box-shadow: 0 0 6px rgba(29, 111, 227, 0.4);
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    font-size: 15px;
    background-color: #1d6fe3;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #0f56c2;
    transform: scale(1.03);
}
</style>

</head>
<body>
<form action="TodaysTransaction" method="get">
<div class="form-box">

    <label>Choose Date</label>
    <input type="date" name="date" required>

    <button>Submit</button>

</div>
</form>
</body>
</html>
