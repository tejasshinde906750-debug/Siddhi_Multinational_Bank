<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="PersnalLoan.css">
</head>
<body>

<form action="PersonalLoanServlet" method="post">
    
   <div class="container"> 
    <h3>Personal Loan Form</h3>
<label>Name</label>

<input type="text" name="Name" placeholder="Enter Customer Name" required><br><br>


    <div class="Second">
<label>Adhaar No</label>
<input type="number" name="Adhaar" placeholder="Enter Adhaar No" required><br><br>

<label>PAN No</label>
<input type="text" name="Pan" placeholder="Enter Pan Number"  required><br><br>

<label>Mobile No</label>
<input type="number" name="Mobile" placeholder="Enter Mobile No" required><br><br>

<label>Monthly Earn</label>
<input type="number" name="Income" placeholder="Enter Income [monthly]" required><br><br>



<label>Office </label>
<input type="text" name="Office" placeholder="Enter office/company name" required><br><br>

<label>Loan Amount</label>
<input type="number" name="LoanAmount" placeholder="Enter Loan Amount" required><br><br>

<label>Duration</label>
<input type="text" name="Duration" placeholder="Enter Duration" required><br><br>

<label>Loan Type</label>
<select name="LoanType" ><option value="Personal Loan">Personal Loan</option></select>
<br><br>
<label>Date</label>
<input type="date" name="Date" required ><br><br>

<label>Address</label>
<input type="text" name="Address" placeholder="Enter Address" required><br><br><br>
<button>Apply Loan</button>
<a href="Loan.html" class="back-btn"> back</a>

</div>




</form>
