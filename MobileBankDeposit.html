<!DOCTYPE html>
<html lang="en">
<head>

    <title>Mobile Banking Login</title>
    <link rel="stylesheet" href="MobileBanking.css">
</head>

<body>
<form action="MobileBankDeposit" Method="post">

<div class="phone">

    <div class="screen">

        <div class="logo">

            <h4>Deposit</h4>
        </div>

        <label>Customer Name</label>
        <input type="" placeholder="Enter your Account" name="accno">

        <label>Account Number</label>
        <input type="text" placeholder="Enter Amount" name="amount">

        <button class="btn login">Deposit</button>
        <button class="btn lock"><a href="MobileBankDashbord.htm">Back</a></button>

    </div>

</div>
