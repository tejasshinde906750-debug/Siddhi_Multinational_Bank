<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mobile Banking Withdraw</title>

    <link rel="stylesheet"
          href="MobileBanking.css">
</head>

<body>

<form action="MobileBankWithdraw" method="post">

<div class="phone">

    <div class="screen">

        <div class="logo">

            <h2>🏦 MyBank</h2>

            <p>Secure Mobile Banking</p>

            <h4>Withdrawal</h4>

        </div>

        <div class="Credit">

            <input type="number"
                   name="amount"
                   placeholder="Enter Amount"
                   required>

            <br><br>

            <input type="submit"
                   class="deposit"
                   value="Withdraw">

            <br><br>

            <button type="button"
                    onclick="window.location.href='MobileBankDashbord.htm'">

                🔙

            </button>

        </div>

    </div>

</div>

</form>

</body>
</html>
